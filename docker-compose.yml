services:

  # ── Banco de dados PostgreSQL ──────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: tickets_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-helpdeskWS}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      # Persiste os dados mesmo se o container for removido
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5


  # ── Backend Flask ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tickets_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy   # Só sobe após o banco estar pronto
    environment:
      # Banco de dados
      DB_HOST: db                    # Nome do serviço acima (não "localhost"!)
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-helpdeskWS}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD}
      # Aplicação
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ACCESS_TOKEN_EXPIRES: ${JWT_ACCESS_TOKEN_EXPIRES:-28800}
      APP_PORT: 5000
      FLASK_DEBUG: "false"
      EMAIL_SERVICE_ENABLED: ${EMAIL_SERVICE_ENABLED:-true}
      # E-mail IMAP
      EMAIL_HOST: ${EMAIL_HOST}
      EMAIL_PORT: ${EMAIL_PORT}
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD}
      # E-mail SMTP
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
    volumes:
      # Persiste os anexos enviados pelos usuários
      - ./backend/public/anexos:/app/public/anexos
    ports:
      - "5000:5000"


  # ── Frontend React (Nginx) ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tickets_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"


volumes:
  postgres_data:
